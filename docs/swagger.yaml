basePath: /api/v1
definitions:
  auth.RsGoogleAuthURL:
    properties:
      url:
        type: string
    type: object
  auth.RsToken:
    properties:
      access_token:
        type: string
      is_superadmin:
        type: boolean
      refresh_token:
        type: string
    type: object
  auth.RsUser:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_superadmin:
        type: boolean
      last_name:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  response.RsError:
    properties:
      code:
        example: 500
        type: integer
      message:
        example: internal server error
        type: string
    type: object
  setting.RsPractitioner:
    properties:
      abn:
        type: string
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      verified:
        type: boolean
    type: object
  setting.RsPractitionerSetting:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      logo:
        type: string
      practitioner_id:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  subscription.RsSubscription:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration_days:
        type: integer
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
  description: Backend API for acareca
  title: Backend API
  version: 1.0.0
