      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscription.RsSubscription'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: List subscriptions
      tags:
      - subscription
    post:
      consumes:
      - application/json
      description: create a new subscription
